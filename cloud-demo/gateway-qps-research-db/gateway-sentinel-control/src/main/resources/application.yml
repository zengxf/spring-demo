spring:
  application:
    name: gateway-sentinel-control
  profiles:
    active: port1
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        group: DEFAULT_GROUP
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      default-filters:
        - StripPrefix=1
  datasource:
    url: jdbc:mysql://localhost:3306/nacos_3?useUnicode=true&characterEncoding=utf-8
      &useSSL=false&failOverReadOnly=false
      &serverTimezone=GMT%2B8
    username: root
    password: abc123

sentinel:
  cluster:
    client:
      server-host: localhost
      server-port: 18730

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30
  mapper-locations: classpath*:/mapper/*.xml

logging:
  level:
    org.apache.ibatis: DEBUG
    org.mybatis: DEBUG
    cn.zxf.sentinel.cluster.gateway: DEBUG

---
# 端口 1 环境
spring:
  config:
    activate:
      on-profile: port1
my:
  sign: SC-AAA-1
server:
  port: 9641


